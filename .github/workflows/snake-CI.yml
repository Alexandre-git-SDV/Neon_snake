name: snake-CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  lint-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-snake]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neon-snake:ci .

      - name: Smoke test container
        run: |
          docker run -d --rm -p 5173:5173 --name neon-snake-ci neon-snake:ci
          sleep 3
          response=$(curl -s http://localhost:5173/)
          echo "$response" | grep -q "Neon" || (echo "Test failed" && exit 1)
          docker stop neon-snake-ci
