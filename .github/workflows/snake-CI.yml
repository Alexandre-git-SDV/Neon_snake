name: snake-CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neon-snake:ci .

      - name: Smoke test container
        run: |
          docker run -d --rm -p 5173:5173 --name neon-snake-ci neon-snake:ci
          sleep 2
          curl -fs http://127.0.0.1:5173 | grep -q "Neon Snake"
          docker stop neon-snake-ci
